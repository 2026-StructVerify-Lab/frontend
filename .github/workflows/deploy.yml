name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            if [ ! -d ~/frontend ]; then
              git clone https://${{ secrets.GH_TOKEN }}@github.com/2026-StructVerify-Lab/frontend.git ~/frontend
            fi
            cd ~/frontend
            git fetch origin
            git reset --hard origin/main
            npm install
            npm run build
            pm2 restart frontend || pm2 start npm --name frontend -- start